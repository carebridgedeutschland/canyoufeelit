<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Lädt...</title>
  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .main {
      width: 250px;
      display: block;
      margin-bottom: 15px;
    }

    .loader2 {
      width: 20px;
    } 
   
 /* Bild nach 5 Klicks fullscreen, zentriert, leicht gestreckt */
    #plakativ {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 10;
      object-fit: cover;      /* füllt Bildschirm, Augen mittig */
      object-position: center;
    }

    #plakativ img {
      width: 100%;
      height: 100%;
      object-fit: cover;      /* Desktop/Mobile füllen */
      object-position: center;
    }
    /* Verhindert Text-/Bild-Auswahl */
body, img, picture, canvas {
  user-select: none;       /* keine Markierung möglich */
  -webkit-user-select: none; /* Safari/Chrome */
  -moz-user-select: none;    /* Firefox */
  -ms-user-select: none;     /* IE/Edge */
}

/* Canvas und Overlay-Bilder ignorieren Mausinteraktionen */
#plakativ, #cursorTrail {
  pointer-events: none;    /* keine Klicks/Maus auf dem Bild möglich */
}
  </style>
</head>
  <body>
  <div class="container">
    <img src="logo.png" class="main">
    <img src="loader2.gif" class="loader2">
  </div>
    
<picture id="plakativ">
    <source srcset="eyessmall.png" media="(max-width: 600px)">
    <img src="eyesbig.png">
  </picture>

     <!-- ✅ Hier einfügen -->
  <canvas id="cursorTrail" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15;display:none;"></canvas>
  
  <audio id="sound" loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>
<audio id="sound2" loop>
  <source src="sound2.mp3" type="audio/mpeg">
</audio>

  <script>
    document.body.addEventListener("click", () => {
      document.getElementById("sound").play();
    }, { once: true });
  </script>
    
  <script>
let clicks = 0;
const plakativ = document.getElementById("plakativ");
const sound = document.getElementById("sound");
const sound2 = document.getElementById("sound2");

 document.body.addEventListener("click", () => {
      clicks++;

      // erster Sound nur beim ersten Klick
      if (clicks === 1) {
        sound.play(); // ✅ korrigiert: alles in einem Listener
      }

      // nach 5 Klicks
      if (clicks >= 5) {
        plakativ.style.display = "block"; // ✅ korrigiert: display richtig setzen
        sound.pause();                     
        sound2.play(); 
        document.body.style.backgroundColor = "#000000"; // hellgrau
      // Ghost-Cursor aktivieren
        canvas.style.display = "block";
        document.body.addEventListener("mousemove", addCursorTrail);
      }
    });
   // ================= Ghost-Cursor-Trail mit Cursor-PNG =================
    const canvas = document.getElementById("cursorTrail");
    const ctx = canvas.getContext("2d");
    let cursors = [];

    // Cursor-Bild
    const cursorImg = new Image();
    cursorImg.src = "cursor.png"; // 🟢 Dein Maus-Cursor PNG hier

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function addCursorTrail(e) {
      cursors.push({ x: e.clientX, y: e.clientY, alpha: 1, size: 32 }); // Größe auf PNG abstimmen
    }

    function animateTrail() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = cursors.length - 1; i >= 0; i--) {
        const c = cursors[i];
        ctx.globalAlpha = c.alpha;
        ctx.drawImage(cursorImg, c.x - c.size/2, c.y - c.size/2, c.size, c.size); // ✅ Mausbild zeichnen
        ctx.globalAlpha = 1;

        c.alpha -= 0.05;
        if (c.alpha <= 0) cursors.splice(i,1);
      }

      requestAnimationFrame(animateTrail);
    }
    animateTrail();
</script>
</body>
</html>
