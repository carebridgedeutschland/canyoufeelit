<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Lädt...</title>
  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .main {
      width: 150px;
      display: block;
      margin-bottom: 15px;
    }

    .loader {
      width: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" class="main">
    <img src="loader.gif" class="loader">
  </div>

  <audio id="sound" loop>
    <source src="sound.mp3" type="audio/mpeg">
  </audio>

  <script>
    document.body.addEventListener("click", () => {
      document.getElementById("sound").play();
    }, { once: true });
  </script>
</body>
</html>
