<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Lädt...</title>
  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .main {
      width: 250px;
      display: block;
      margin-bottom: 15px;
    }

    .loader2 {
      width: 20px;
    } 
   
    @media only screen and (max-width: 250px) {
    .main {
      width: 400px; /* Logo kleiner auf Handy */
    }
    .loader {
      width: 60px; /* Loader kleiner auf Handy */
    }
  }
  </style>
</head>
  <body>
  <div class="container">
    <img src="logo.png" class="main">
    <img src="loader2.gif" class="loader2">
  </div>
<img id="plakativ" src="eyes.png" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 10;">  <audio id="sound" loop>
    <source src="sound.mp3" type="audio/mpeg">
  <audio id="sound" loop>
  <source src="sound.mp3" type="audio/mpeg">
</audio>

<audio id="sound2" loop>
  <source src="sound2.mp3" type="audio/mpeg">
</audio>

  <script>
    document.body.addEventListener("click", () => {
      document.getElementById("sound").play();
    }, { once: true });
  </script>
    
  <script>
let clicks = 0;
const plakativ = document.getElementById("plakativ");
const sound = document.getElementById("sound");
const sound2 = document.getElementById("sound2");

document.body.addEventListener("click", () => {
  sound.play();
}, { once: true });

document.body.addEventListener("click", () => {
  clicks++;
  if (clicks >= 5) {
    plakativ.style.display = "block";  // 
    sound.pause();                     
    sound2.play(); 
  }
});
</script>
</body>
</html>
