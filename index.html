<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Lädt...</title>
<style>
  body {
    margin: 0;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    transition: background-color 0.5s ease;
    font-family: Helvetica, Arial, sans-serif;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .main {
    width: 250px;
    display: block;
    margin-bottom: 15px;
  }

  .loader2 {
    width: 20px;
    display: block;
  }

  #plakativ {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    z-index: 10;
    object-fit: cover;
    object-position: center;
  }

  #plakativ img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  #cursorTrail {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index:15;
    display:none;
  }

  body, img, picture, canvas {
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
  }

  #plakativ, #cursorTrail {
    pointer-events: none;
  }

  /* Link-Style + Fade-In */
  #specialLink {
    display: none;
    position: fixed;
    left: 50%;
    top: 70%;
    transform: translateX(-50%);
    background-color: black;
    color: blue;
    padding: 8px 12px;
    border-radius: 4px;
    text-decoration: none;
    z-index: 20;
    font-size: 18px;
    opacity: 0;
    transition: opacity 1s ease;
  }

  #specialLink.show {
    display: block;
    opacity: 1;
  }

</style>
</head>
<body>
  <div class="container">
    <img src="logo.png" class="main">
    <img src="loader2.gif" class="loader2">
  </div>

  <picture id="plakativ">
    <source srcset="eyessmall.png" media="(max-width: 600px)">
    <img src="eyesbig.png">
  </picture>

  <canvas id="cursorTrail"></canvas>

  <a href="https://www.youtube.com/watch?v=EFxkucJshGM&t=896s" id="specialLink" target="_blank">ARCHIV 2</a>

  <audio id="sound" loop>
    <source src="sound.mp3" type="audio/mpeg">
  </audio>
  <audio id="sound2" loop>
    <source src="sound2.mp3" type="audio/mpeg">
  </audio>

<script>
  let clicks = 0;
  const plakativ = document.getElementById("plakativ");
  const sound = document.getElementById("sound");
  const sound2 = document.getElementById("sound2");
  const canvas = document.getElementById("cursorTrail");
  const ctx = canvas.getContext("2d");
  const cursorImg = new Image();
  cursorImg.src = "cursor.png";
  const specialLink = document.getElementById("specialLink");
  let cursors = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  function addCursorTrail(e) {
    cursors.push({ x: e.clientX, y: e.clientY, alpha: 1, size: 32 });
  }

  function animateTrail() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=cursors.length-1;i>=0;i--){
      const c = cursors[i];
      ctx.globalAlpha = c.alpha;
      ctx.drawImage(cursorImg, c.x-c.size/2, c.y-c.size/2, c.size, c.size);
      ctx.globalAlpha = 1;
      c.alpha -= 0.05;
      if(c.alpha <= 0) cursors.splice(i,1);
    }
    requestAnimationFrame(animateTrail);
  }
  animateTrail();

  document.body.addEventListener("click", () => {
    clicks++;

    if(clicks === 1){
      sound.play();
    }

    if(clicks === 5){
      sound.pause();
      sound2.play();
      document.body.style.backgroundColor = "black";
      plakativ.style.display = "block";
      document.body.style.cursor = "none";
      canvas.style.display = "block";
      document.body.addEventListener("mousemove", addCursorTrail);

      // Link nach 3 Sekunden mit Fade-In
      setTimeout(() => {
        specialLink.classList.add("show");
      }, 3000);
    }
  });

  document.body.style.cursor = "url('cursor.png') 16 16, auto";
</script>
</body>
</html>
